version: 2
project_name: repomap

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: repomap
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/repomap/repomap/cmd.version={{.Version}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: humzakhan
      name: homebrew-tap
    homepage: "https://github.com/humzakhan/repomap"
    description: "Visualize any codebase as an interactive HTML report"
    license: "MIT"
    install: |
      bin.install "repomap"
